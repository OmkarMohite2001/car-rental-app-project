<section class="loader-overlay" role="status" aria-live="polite" aria-busy="true">
  <article class="loader-card">
    <div class="road-wrap">
      <div class="road-lines"></div>
      <div class="car">
        <span class="material-icons car-icon">directions_car</span>
        <span class="wheel rear"></span>
        <span class="wheel front"></span>
      </div>
    </div>

    <h2>{{ label() }}</h2>
    <p>{{ detail() }}</p>

    <div class="progress-rail">
      <span></span>
    </div>
  </article>
</section>
